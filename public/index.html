<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Personal Chat App</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #1e1f26;
    color: #eee;
    display: flex;
    height: 100vh;
  }

  /* Auth screen */
  #auth-screen {
    margin: auto;
    background: #2b2d38;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
  }
  #auth-screen h1 { margin-top: 0; font-size: 22px; }
  #auth-screen input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1e1f26;
    color: #eee;
    margin-bottom: 12px;
    font-size: 14px;
  }
  #auth-screen button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #5865f2;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 8px;
  }
  #auth-screen button:hover { background: #4752c4; }
  #auth-toggle {
    background: none;
    color: #8a90f5;
    font-weight: normal;
    font-size: 13px;
    text-decoration: underline;
    margin-top: 4px;
  }
  #auth-toggle:hover { background: none; color: #b0b4ff; }
  #auth-error {
    color: #f66;
    font-size: 13px;
    min-height: 18px;
    margin-bottom: 8px;
  }

  /* Chat layout */
  #chat-container {
    display: none;
    width: 100%;
    height: 100%;
  }
  #sidebar {
    width: 200px;
    background: #24252f;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #sidebar h3 { font-size: 13px; color: #999; text-transform: uppercase; }
  #user-list { list-style: none; padding: 0; margin: 0; flex: 1; }
  #user-list li { padding: 6px 0; font-size: 14px; }
  #logout-btn {
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: #3a3c47;
    color: #eee;
    cursor: pointer;
    font-size: 13px;
  }
  #logout-btn:hover { background: #4a4c57; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .msg { margin-bottom: 10px; max-width: 70%; }
  .msg .meta { font-size: 12px; color: #999; margin-bottom: 2px; }
  .msg .bubble {
    background: #2b2d38;
    padding: 8px 12px;
    border-radius: 8px;
    display: inline-block;
    word-wrap: break-word;
  }
  .msg.own { margin-left: auto; text-align: right; }
  .msg.own .bubble { background: #5865f2; }
  .system-msg {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin: 8px 0;
  }
  #typing-indicator { font-size: 12px; color: #888; height: 18px; padding: 0 16px; }

  #chat-form {
    display: flex;
    padding: 12px;
    background: #24252f;
    gap: 8px;
  }
  #chat-form input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1e1f26;
    color: #eee;
  }
  #chat-form button {
    width: 90px;
    border: none;
    border-radius: 6px;
    background: #5865f2;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <h1 id="auth-title">💬 Log In</h1>
    <div id="auth-error"></div>
    <input id="username-input" type="text" placeholder="Username" maxlength="20" />
    <input id="password-input" type="password" placeholder="Password" maxlength="50" />
    <button id="auth-submit-btn">Log In</button>
    <button id="auth-toggle" type="button">Account nahi hai? Sign up karo</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-container">
    <div id="sidebar">
      <h3>Online</h3>
      <ul id="user-list"></ul>
      <button id="logout-btn">Log Out</button>
    </div>
    <div id="main">
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <form id="chat-form">
        <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let myUsername = '';
    let myToken = localStorage.getItem('chat_token') || '';
    let mode = 'login'; // or 'signup'

    const authScreen = document.getElementById('auth-screen');
    const authTitle = document.getElementById('auth-title');
    const authError = document.getElementById('auth-error');
    const authSubmitBtn = document.getElementById('auth-submit-btn');
    const authToggle = document.getElementById('auth-toggle');
    const usernameInput = document.getElementById('username-input');
    const passwordInput = document.getElementById('password-input');

    const chatContainer = document.getElementById('chat-container');
    const messagesDiv = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const userList = document.getElementById('user-list');
    const typingIndicator = document.getElementById('typing-indicator');
    const logoutBtn = document.getElementById('logout-btn');

    // ---- Toggle between Login / Signup ----
    authToggle.addEventListener('click', () => {
      mode = mode === 'login' ? 'signup' : 'login';
      authError.textContent = '';
      if (mode === 'signup') {
        authTitle.textContent = '📝 Sign Up';
        authSubmitBtn.textContent = 'Sign Up';
        authToggle.textContent = 'Pehle se account hai? Log in karo';
      } else {
        authTitle.textContent = '💬 Log In';
        authSubmitBtn.textContent = 'Log In';
        authToggle.textContent = 'Account nahi hai? Sign up karo';
      }
    });

    // ---- Submit login/signup ----
    authSubmitBtn.addEventListener('click', submitAuth);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAuth(); });

    async function submitAuth() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      authError.textContent = '';

      if (!username || !password) {
        authError.textContent = 'Username aur password dono bharo';
        return;
      }

      const endpoint = mode === 'signup' ? '/api/signup' : '/api/login';
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          authError.textContent = data.error || 'Kuch galat ho gaya';
          return;
        }
        myUsername = data.username;
        myToken = data.token;
        localStorage.setItem('chat_token', myToken);
        localStorage.setItem('chat_username', myUsername);
        enterChat();
      } catch (err) {
        authError.textContent = 'Server se connect nahi ho paya';
      }
    }

    // ---- Auto-login if a saved token exists ----
    async function tryAutoLogin() {
      if (!myToken) return;
      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: myToken })
        });
        const data = await res.json();
        if (res.ok) {
          myUsername = data.username;
          enterChat();
        } else {
          localStorage.removeItem('chat_token');
        }
      } catch {
        // server unreachable, just show login screen
      }
    }

    // ---- Log out ----
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('chat_token');
      localStorage.removeItem('chat_username');
      if (socket) socket.disconnect();
      location.reload();
    });

    // ---- Enter chat after successful auth ----
    function enterChat() {
      authScreen.style.display = 'none';
      chatContainer.style.display = 'flex';
      connectSocket();
    }

    function connectSocket() {
      socket = io();

      socket.on('connect', () => {
        socket.emit('join', { token: myToken });
      });

      socket.on('auth-error', (msg) => {
        alert(msg);
        localStorage.removeItem('chat_token');
        location.reload();
      });

      socket.on('chat-message', (data) => {
        const div = document.createElement('div');
        div.className = 'msg' + (data.username === myUsername ? ' own' : '');
        div.innerHTML = `<div class="meta"></div><div class="bubble"></div>`;
        div.querySelector('.meta').textContent = `${data.username} • ${data.time}`;
        div.querySelector('.bubble').textContent = data.text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });

      socket.on('system-message', (text) => {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });

      socket.on('user-list', (users) => {
        userList.innerHTML = '';
        users.forEach((u) => {
          const li = document.createElement('li');
          li.textContent = u;
          userList.appendChild(li);
        });
      });

      let typingTimeout;
      socket.on('typing', (username) => {
        typingIndicator.textContent = `${username} is typing...`;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { typingIndicator.textContent = ''; }, 1500);
      });
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text || !socket) return;
      socket.emit('chat-message', text);
      messageInput.value = '';
    });

    messageInput.addEventListener('input', () => {
      if (socket) socket.emit('typing');
    });

    // Kick things off
    tryAutoLogin();
  </script>
</body>
</html>
