<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Personal Chat App</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #1e1f26;
    color: #eee;
    display: flex;
    height: 100vh;
  }

  /* Join screen */
  #join-screen {
    margin: auto;
    background: #2b2d38;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
  }
  #join-screen h1 { margin-top: 0; font-size: 22px; }
  #join-screen input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1e1f26;
    color: #eee;
    margin-bottom: 12px;
    font-size: 14px;
  }
  #join-screen button, #chat-form button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #5865f2;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  #join-screen button:hover, #chat-form button:hover { background: #4752c4; }

  /* Chat layout */
  #chat-container {
    display: none;
    width: 100%;
    height: 100%;
  }
  #sidebar {
    width: 200px;
    background: #24252f;
    padding: 16px;
    overflow-y: auto;
  }
  #sidebar h3 { font-size: 13px; color: #999; text-transform: uppercase; }
  #user-list { list-style: none; padding: 0; margin: 0; }
  #user-list li { padding: 6px 0; font-size: 14px; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .msg { margin-bottom: 10px; max-width: 70%; }
  .msg .meta { font-size: 12px; color: #999; margin-bottom: 2px; }
  .msg .bubble {
    background: #2b2d38;
    padding: 8px 12px;
    border-radius: 8px;
    display: inline-block;
    word-wrap: break-word;
  }
  .msg.own { margin-left: auto; text-align: right; }
  .msg.own .bubble { background: #5865f2; }
  .system-msg {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin: 8px 0;
  }
  #typing-indicator { font-size: 12px; color: #888; height: 18px; padding: 0 16px; }

  #chat-form {
    display: flex;
    padding: 12px;
    background: #24252f;
    gap: 8px;
  }
  #chat-form input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1e1f26;
    color: #eee;
  }
  #chat-form button { width: 90px; }
</style>
</head>
<body>

  <!-- Join Screen -->
  <div id="join-screen">
    <h1>💬 Join Chat</h1>
    <input id="username-input" type="text" placeholder="Enter your name" maxlength="20" />
    <button id="join-btn">Join</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-container">
    <div id="sidebar">
      <h3>Online</h3>
      <ul id="user-list"></ul>
    </div>
    <div id="main">
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <form id="chat-form">
        <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myUsername = '';

    const joinScreen = document.getElementById('join-screen');
    const chatContainer = document.getElementById('chat-container');
    const usernameInput = document.getElementById('username-input');
    const joinBtn = document.getElementById('join-btn');
    const messagesDiv = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const userList = document.getElementById('user-list');
    const typingIndicator = document.getElementById('typing-indicator');

    function joinChat() {
      const name = usernameInput.value.trim();
      if (!name) return;
      myUsername = name;
      socket.emit('join', name);
      joinScreen.style.display = 'none';
      chatContainer.style.display = 'flex';
      messageInput.focus();
    }

    joinBtn.addEventListener('click', joinChat);
    usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinChat(); });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;
      socket.emit('chat-message', text);
      messageInput.value = '';
    });

    let typingTimeout;
    messageInput.addEventListener('input', () => {
      socket.emit('typing');
    });

    socket.on('chat-message', (data) => {
      const div = document.createElement('div');
      div.className = 'msg' + (data.username === myUsername ? ' own' : '');
      div.innerHTML = `
        <div class="meta">${data.username} • ${data.time}</div>
        <div class="bubble"></div>
      `;
      div.querySelector('.bubble').textContent = data.text; // safe text insertion
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('system-message', (text) => {
      const div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on('user-list', (users) => {
      userList.innerHTML = '';
      users.forEach((u) => {
        const li = document.createElement('li');
        li.textContent = u;
        userList.appendChild(li);
      });
    });

    socket.on('typing', (username) => {
      typingIndicator.textContent = `${username} is typing...`;
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { typingIndicator.textContent = ''; }, 1500);
    });
  </script>
</body>
</html>
